<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Viendo: {{ filename }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; /* Opcional: evita barras de scroll si la imagen es muy grande */
        }
        .fullscreen-container {
            display: flex;
            justify-content: center; /* Centra horizontalmente */
            align-items: center;     /* Centra verticalmente */
            height: 100%;            /* Ocupa el 100% del alto del body */
            width: 100%;             /* Ocupa el 100% del ancho del body */
            background-color: #212529; /* Fondo oscuro */
        }

        .fullscreen-media {
            max-width: 95vw;   /* La imagen no será más ancha que el 95% del viewport */
            max-height: 95vh;  /* La imagen no será más alta que el 95% del viewport */
            border-radius: 8px;
            object-fit: contain; /* Asegura que la imagen se ajuste sin recortarse */
        }
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.7;
            z-index: 10;
        }
        .nav-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="fullscreen-container">
  {% set ext = filename.rsplit('.',1)[1].lower() if '.' in filename else '' %}
  {% if ext in ['mp4','avi','mov','webm'] %}
    <video controls autoplay class="fullscreen-media">
      <source src="{{ url_for('static', filename='uploads/' + filename) }}" type="video/mp4">
      Tu navegador no soporta video.
    </video>
  {% else %}
    <img src="{{ url_for('static', filename='uploads/' + filename) }}" class="fullscreen-media" alt="{{ filename }}">
  {% endif %}
</div>

<a href="{{ url_for('index') }}" class="btn btn-light position-absolute top-0 start-0 m-3 opacity-75" style="z-index: 10;">
  Volver
</a>

{% if prev_filename %}
  <a href="{{ url_for('view_file', filename=prev_filename) }}" class="btn btn-light nav-btn start-0 m-3">
    &lt;
  </a>
{% endif %}

{% if next_filename %}
  <a href="{{ url_for('view_file', filename=next_filename) }}" class="btn btn-light nav-btn end-0 m-3">
    &gt;
  </a>
{% endif %}

</body>
</html>
